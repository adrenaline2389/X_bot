name: Whale Alert

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: whale-alert
  cancel-in-progress: false

jobs:
  whale-alert:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      API_KEY: ${{ secrets.API_KEY }}
      API_SECRET: ${{ secrets.API_SECRET }}
      ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
      ACCESS_SECRET: ${{ secrets.ACCESS_SECRET }}
      WHALE_BTC_THRESHOLD: ${{ vars.WHALE_BTC_THRESHOLD || '1000' }}
      WHALE_SCAN_BLOCKS: ${{ vars.WHALE_SCAN_BLOCKS || '6' }}
      WHALE_CACHE_PATH: .cache/posted_whale_txs.json
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Restore posted transaction cache
        uses: actions/cache/restore@v5
        with:
          path: .cache/posted_whale_txs.json
          key: whale-alert-${{ github.run_id }}
          restore-keys: whale-alert-

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Validate required secrets
        shell: bash
        run: |
          missing=0
          for name in API_KEY API_SECRET ACCESS_TOKEN ACCESS_SECRET; do
            if [ -z "${!name}" ]; then
              echo "::error::$name is not set"
              missing=1
            fi
          done
          exit "$missing"

      - name: Run whale alert
        run: python -m x_bot whale-alert

      - name: Ensure cache file exists
        if: always()
        run: mkdir -p .cache && test -f .cache/posted_whale_txs.json || echo '{"posted_tx_hashes":[]}' > .cache/posted_whale_txs.json

      - name: Save posted transaction cache
        if: always()
        uses: actions/cache/save@v5
        with:
          path: .cache/posted_whale_txs.json
          key: whale-alert-${{ github.run_id }}
