name: Price Report

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  price-report:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      API_KEY: ${{ secrets.API_KEY }}
      API_SECRET: ${{ secrets.API_SECRET }}
      ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
      ACCESS_SECRET: ${{ secrets.ACCESS_SECRET }}
      PRICE_SYMBOLS: ${{ vars.PRICE_SYMBOLS || 'bitcoin' }}
      PRICE_VS_CURRENCY: ${{ vars.PRICE_VS_CURRENCY || 'usd' }}
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Validate required secrets
        shell: bash
        run: |
          missing=0
          for name in API_KEY API_SECRET ACCESS_TOKEN ACCESS_SECRET; do
            if [ -z "${!name}" ]; then
              echo "::error::$name is not set"
              missing=1
            fi
          done
          exit "$missing"

      - name: Run price report
        run: python -m x_bot price-report
